services:
  db:
    image: mariadb:11.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-igreja_db}
      MYSQL_USER: ${MYSQL_USER:-igreja_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-user}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-change-me-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER:-igreja_user}:${MYSQL_PASSWORD:-change-me-user}@db:3306/${MYSQL_DATABASE:-igreja_db}"
      SECRET_KEY: ${SECRET_KEY:-change-me-app-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-admin}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME:-admin}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD:-admin1234}
      DEFAULT_LOCAL_NOME: ${DEFAULT_LOCAL_NOME:-Templo Sede}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
