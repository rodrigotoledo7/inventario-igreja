services:
  backend:
    build: ./back
    restart: always
    # Expõe a porta para o seu navegador/frontend conseguir acessar
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/igreja.db}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-admin}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD}
      DEFAULT_LOCAL_NOME: ${DEFAULT_LOCAL_NOME:-Templo Sede}
    volumes:
      - ./back/data:/app/data
    networks:
      - app-network

  frontend:
    build:
      context: ./front
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
